<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        :root { --earth: #0d160f; --gold: #c2a878; --cream: #fefae0; }

        .container { width: 92%; max-width: 700px; border: 1px solid rgba(194,168,120,0.2); padding: 60px 40px; background: rgba(255,255,255,0.01); backdrop-filter: blur(20px); position: relative; }
        .quiz-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 6px; color: var(--gold); text-align: center; display: block; margin-bottom: 40px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 30px; text-align: center; font-weight: 400; line-height: 1.5; color: var(--gold); }
        .quiz-step { display: none; }
        .quiz-step.active { display: block; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .option-btn { display: block; width: 100%; padding: 18px 25px; margin-bottom: 12px; background: transparent; border: 1px solid rgba(194, 168, 120, 0.3); color: var(--cream); cursor: pointer; text-align: left; font-size: 0.95rem; transition: 0.3s; line-height: 1.4; }
        .option-btn:hover { background: rgba(194, 168, 120, 0.08); border-color: var(--gold); padding-left: 30px; }
        input[type="email"] { width: 100%; padding: 20px; background: transparent; border: 1px solid var(--gold); color: white; margin-bottom: 25px; text-align: center; font-size: 1.1rem; }
        .action-btn { background: var(--gold); color: var(--earth); padding: 20px; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; width: 100%; letter-spacing: 3px; font-size: 1rem; }
        .result-header { font-family: 'Pinyon Script', cursive; font-size: 3.5rem; color: var(--gold); text-align: center; margin-bottom: 20px; }
        .insight-box { margin-top: 30px; border-top: 1px solid rgba(194,168,120,0.3); padding-top: 30px; line-height: 1.8; font-size: 1.05rem; }
        .progress { text-align: center; font-size: 0.7rem; letter-spacing: 2px; margin-top: 20px; opacity: 0.5; }
    </style>
</head>
<body>
