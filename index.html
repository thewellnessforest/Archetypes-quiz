<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sovereign Archetypes Quiz</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --earth-deep: #0d160f;
            --gold: #c2a878;
            --cream: #fefae0;
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--earth-deep);
            color: var(--cream);
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 100% 100%, rgba(58, 90, 64, 0.12) 0%, transparent 40%);
        }
        .vertical-brand {
            position: fixed; height: 100vh; width: 60px; top: 0; display: flex; align-items: center; justify-content: center;
            font-family: 'Pinyon Script', cursive; font-size: 1.8rem; color: var(--gold); opacity: 0.2;
            writing-mode: vertical-rl; text-orientation: mixed; letter-spacing: 8px; z-index: 1;
        }
        .left-brand { left: 20px; transform: rotate(180deg); }
        .right-brand { right: 20px; }
        .container {
            width: 90%; max-width: 800px; background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(30px);
            border: 1px solid rgba(194, 168, 120, 0.12); padding: 80px 50px; position: relative; z-index: 10;
        }
        .quiz-title-text { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 8px; color: var(--gold); text-align: center; display: block; margin-bottom: 40px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 45px; text-align: center; }
        .quiz-step { display: none; }
        .quiz-step.active { display: block; animation: fadeIn 1s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .option-btn {
            display: block; width: 100%; padding: 24px 35px; margin-bottom: 18px; background: transparent;
            border: 1px solid rgba(194, 168, 120, 0.15); color: var(--cream); cursor: pointer; text-align: left; transition: var(--transition);
        }
        .option-btn:hover { background: rgba(194, 168, 120, 0.05); border-color: var(--gold); padding-left: 45px; }
        .archetype-name { font-family: 'Pinyon Script', cursive; font-size: 4.5rem; color: var(--gold); line-height: 1; }
        .archetype-subtitle { font-family: 'Playfair Display', serif; text-transform: uppercase; letter-spacing: 6px; font-size: 1.1rem; margin-bottom: 40px; color: var(--gold); }
        .insight-section { background: rgba(194, 168, 120, 0.02); padding: 40px; margin: 40px 0; border: 1px solid rgba(194, 168, 120, 0.1); text-align: left; }
        .action-btn { background: var(--gold); color: var(--earth-deep); padding: 22px 50px; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; width: 100%; letter-spacing: 4px; }
        input[type="email"] { width: 100%; padding: 24px; background: transparent; border: 1px solid var(--gold); color: white; margin-bottom: 25px; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="vertical-brand left-brand">SOVEREIGN SEER</div>
<div class="vertical-brand right-brand">SOVEREIGN SEER</div>

<div class="container">
    <span class="quiz-title-text">The Sovereign Archetypes Quiz</span>
    <div id="quiz-flow">
        <div class="quiz-step active" id="step1">
            <h2>How do you primarily interact with the world around you?</h2>
            <button class="option-btn" onclick="tally('Seer', 3); next(2)">I observe patterns and hidden truths that others miss.</button>
            <button class="option-btn" onclick="tally('Caregiver', 3); next(2)">I focus on the goodness and safety of the environment.</button>
            <button class="option-btn" onclick="tally('Hero', 3); next(2)">I take action to overcome challenges and prove my strength.</button>
            <button class="option-btn" onclick="tally('Explorer', 3); next(2)">I seek new experiences and radical self-expression.</button>
        </div>
        <div class="quiz-step" id="step2">
            <h2>What is your greatest internal resistance?</h2>
            <button class="option-btn" onclick="tally('Seer', 3); next(3)">The frustration of being unheard or seeing the disaster before it happens.</button>
            <button class="option-btn" onclick="tally('Sage', 3); next(3)">The fear of being misled, ignorant, or losing mental authority.</button>
            <button class="option-btn" onclick="tally('Lover', 3); next(3)">The fear of being unwanted or living a life without connection.</button>
            <button class="option-btn" onclick="tally('Ruler', 3); next(3)">The fear of chaos and losing the ability to provide structure.</button>
        </div>
        <div class="quiz-step" id="step3">
            <h2>Which role do you naturally fall into within a group?</h2>
            <button class="option-btn" onclick="tally('Seer', 3); next(4)">The Observer who sees the frequency behind the conversation.</button>
            <button class="option-btn" onclick="tally('Magician', 3); next(4)">The Alchemist who transforms energy and manifests shifts.</button>
            <button class="option-btn" onclick="tally('Everyman', 3); next(4)">The Anchor who keeps things relatable and grounded.</button>
            <button class="option-btn" onclick="tally('Creator', 3); next(4)">The Visionary who imagines paths that don't yet exist.</button>
        </div>
        <div class="quiz-step" id="step-email">
            <h2>Your Sacred Archetype is ready...</h2>
            <input type="email" id="userEmail" placeholder="you@example.com">
            <button class="action-btn" id="submitBtn" onclick="sendAndShow()">Decode My Essence</button>
        </div>
        <div class="quiz-step" id="step-results">
            <div id="resultsContent"></div>
        </div>
    </div>
</div>

<script>
    // INITIALIZE EMAILJS - REPLACE 'YOUR_PUBLIC_KEY' WITH YOUR ACTUAL KEY FROM EMAILJS
    (function(){
        emailjs.init("YOUR_PUBLIC_KEY"); 
    })();

    const scores = { Seer: 0, Sage: 0, Caregiver: 0, Hero: 0, Explorer: 0, Ruler: 0, Creator: 0, Magician: 0, Outlaw: 0, Lover: 0, Jester: 0, Everyman: 0, Innocent: 0 };
    function tally(arch, pts) { scores[arch] += pts; }
    function next(s) {
        document.querySelectorAll('.quiz-step').forEach(el => el.classList.remove('active'));
        const target = s === 4 ? 'step-email' : 'step' + s;
        document.getElementById(target).classList.add('active');
    }

    function sendAndShow() {
        const email = document.getElementById('userEmail').value;
        if(!email.includes('@')) return alert("Please provide a valid email.");
        
        let winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        // Change button state
        document.getElementById('submitBtn').innerText = "Tuning your frequency...";
        document.getElementById('submitBtn').disabled = true;

        // SEND THE EMAIL via EmailJS
        // You will create a template in EmailJS and use the ID here
        emailjs.send("service_id", "template_id", {
            to_email: email,
            from_name: "The Sovereign Seer",
            archetype: winner,
            reply_to: "thewellnessforest@gmail.com"
        }).then(() => {
            renderResults(winner);
        }, (err) => {
            console.log("Email failed...", err);
            renderResults(winner); // Still show results even if email fails
        });
    }

    function renderResults(winner) {
        document.getElementById('step-email').classList.remove('active');
        document.getElementById('step-results').classList.add('active');
        
        // (Insert the result data logic from the previous high-end version here)
        document.getElementById('resultsContent').innerHTML = `
            <div class="archetype-name">${winner}</div>
            <div class="archetype-subtitle">Architect of Sovereignty</div>
            <div class="insight-section">
                <p>Check your inbox at <b>thewellnessforest@gmail.com</b> for your full Sovereign Roadmap.</p>
            </div>
            <button class="action-btn" onclick="location.reload()">Take Again</button>
        `;
    }
</script>
</body>
</html>
