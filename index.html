<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Seer | The Universal Archetype Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --earth-deep: #0f1a13;
            --forest: #1b2e21;
            --moss: #3a5a40;
            --gold: #c2a878;
            --cream: #fefae0;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--earth-deep);
            color: var(--cream);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(58, 90, 64, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(194, 168, 120, 0.1) 0%, transparent 50%);
        }

        .container {
            width: 95%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(194, 168, 120, 0.15);
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
        }

        .brand-logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 2.8rem;
            color: var(--gold);
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 35px;
            text-align: center;
            font-weight: 400;
        }

        .quiz-step { display: none; }
        .quiz-step.active { display: block; animation: slideIn 0.8s ease forwards; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 20px 30px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(194, 168, 120, 0.2);
            color: var(--cream);
            border-radius: 100px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: var(--transition);
        }

        .option-btn:hover {
            background: var(--gold);
            color: var(--earth-deep);
            border-color: var(--gold);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .result-card { text-align: center; }
        .archetype-name { font-family: 'Pinyon Script', cursive; font-size: 4rem; color: var(--gold); margin-bottom: 5px; }
        .archetype-subtitle { font-family: 'Playfair Display', serif; text-transform: uppercase; letter-spacing: 5px; font-size: 1.1rem; margin-bottom: 30px; color: var(--cream); }

        .insight-section {
            background: rgba(163, 177, 138, 0.05);
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
            border: 1px solid rgba(194, 168, 120, 0.1);
            text-align: left;
        }

        .discount-container {
            background: var(--gold);
            color: var(--earth-deep);
            padding: 20px;
            border-radius: 10px;
            margin: 25px 0;
            font-weight: 700;
        }

        .action-btn {
            background: var(--gold);
            color: var(--earth-deep);
            padding: 20px 40px;
            border: none;
            border-radius: 100px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        input[type="email"] {
            width: 100%;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--gold);
            border-radius: 100px;
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-logo">Sovereign Seer</div>

    <div id="quiz-flow">
        <div class="quiz-step active" id="step1">
            <h2>How do you primarily interact with the world around you?</h2>
            <button class="option-btn" onclick="tally('Seer', 3); tally('Sage', 1); next(2)">I observe patterns and hidden truths that others miss.</button>
            <button class="option-btn" onclick="tally('Innocent', 3); tally('Caregiver', 1); next(2)">I focus on the goodness and safety of the environment.</button>
            <button class="option-btn" onclick="tally('Hero', 3); tally('Outlaw', 1); next(2)">I take action to overcome challenges and prove my strength.</button>
            <button class="option-btn" onclick="tally('Explorer', 3); tally('Creator', 1); next(2)">I am constantly seeking new experiences and self-expression.</button>
        </div>

        <div class="quiz-step" id="step2">
            <h2>What is your greatest internal fear?</h2>
            <button class="option-btn" onclick="tally('Seer', 3); tally('Magician', 1); next(3)">Being unheard or seeing a disaster before it happens.</button>
            <button class="option-btn" onclick="tally('Caregiver', 3); tally('Everyman', 1); next(3)">Being selfish or seeing those I love suffer.</button>
            <button class="option-btn" onclick="tally('Sage', 3); tally('Ruler', 1); next(3)">Being misled, ignorant, or lacking control over my mind.</button>
            <button class="option-btn" onclick="tally('Lover', 3); tally('Jester', 1); next(3)">Being unwanted, unloved, or living a life without joy.</button>
        </div>

        <div class="quiz-step" id="step3">
            <h2>In a group dynamic, which role do you naturally fall into?</h2>
            <button class="option-btn" onclick="tally('Seer', 2); tally('Magician', 3); next(4)">The one who transforms the energy and creates "magic."</button>
            <button class="option-btn" onclick="tally('Ruler', 3); tally('Hero', 1); next(4)">The one who takes charge and brings order to chaos.</button>
            <button class="option-btn" onclick="tally('Everyman', 3); tally('Jester', 1); next(4)">The one who keeps things grounded and relatable.</button>
            <button class="option-btn" onclick="tally('Creator', 3); tally('Explorer', 1); next(4)">The one who envisions a new way of doing things.</button>
        </div>

        <div class="quiz-step" id="step-email">
            <h2>Your Sacred Archetype is ready...</h2>
            <p style="text-align: center; margin-bottom: 25px; opacity: 0.8;">Enter your email to anchor your results and receive your custom Sovereign path.</p>
            <input type="email" id="userEmail" placeholder="your@email.com">
            <button class="action-btn" onclick="showResults()">Decode My Essence</button>
        </div>

        <div class="quiz-step" id="step-results">
            <div id="resultsContent" class="result-card"></div>
        </div>
    </div>
</div>

<script>
    const scores = {
        Seer: 0, Sage: 0, Innocent: 0, Explorer: 0, Ruler: 0, Creator: 0, 
        Caregiver: 0, Magician: 0, Hero: 0, Outlaw: 0, Lover: 0, Jester: 0, Everyman: 0
    };

    function tally(archetype, points) {
        scores[archetype] += points;
    }

    function next(s) {
        document.querySelectorAll('.quiz-step').forEach(el => el.classList.remove('active'));
        if(s === 4) document.getElementById('step-email').classList.add('active');
        else document.getElementById('step' + s).classList.add('active');
    }

    function showResults() {
        const email = document.getElementById('userEmail').value;
        if(!email.includes('@')) { alert("Please provide a valid email."); return; }

        let topArchetype = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        document.getElementById('step-email').classList.remove('active');
        document.getElementById('step-results').classList.add('active');

        const data = {
            Seer: {
                sub: "The Architect of Pattern Recognition",
                desc: "You possess the 'Sovereign Sight.' You see the frequency behind the transaction and often feel the frustration of being unheard by those trapped in mental fog.",
                insight: "Your accuracy is your authority. Stop seeking validation from those who cannot see what you see.",
                steps: "You are ready for the deep dive. Your unique framework is already within you; you just need the lens to focus it.",
                isSeer: true
            },
            Sage: {
                sub: "The Guardian of Truth",
                desc: "You seek knowledge above all else. However, you can often get trapped in 'Analysis Paralysis,' gathering data but failing to act on the patterns.",
                insight: "Knowing is not the same as Seeing. The Sage needs the Seer's Lens to move from information to transformation.",
                steps: "<b>Step X:</b> Practice 'Quiet Observation' without Googling the answer. <b>Step Y:</b> Focus on your Inner Accuracy before buying more books.",
                isSeer: false
            },
            Magician: {
                sub: "The Catalyst of Change",
                desc: "You believe in transformation. You want to make things happen, but without Sovereignty, your magic becomes a performance for others' approval.",
                insight: "True magic is a frequency, not a trick. If you are exhausted, you are performing, not manifesting.",
                steps: "<b>Step X:</b> Identify where you are 'people pleasing' with your talents. <b>Step Y:</b> Ground your energy in your own worth first.",
                isSeer: false
            },
            Ruler: {
                sub: "The Sovereign of Structure",
                desc: "You bring order. You are a natural leader, but you often carry the weight of everyone else's world, leading to deep burnout and resentment.",
                insight: "A true Ruler doesn't control; they observe. Sovereignty means leading yourself first.",
                steps: "<b>Step X:</b> Release the 'Victim Label' of being the only responsible one. <b>Step Y:</b> Delegate the 'Harmony Lie' to someone else.",
                isSeer: false
            },
            Creator: {
                sub: "The Visionary Artist",
                desc: "You see what could be. Your struggle is in the 'Mental Fog' of having too many ideas and no clear pattern to follow.",
                insight: "Creativity requires the 'Seer's Accuracy' to distinguish between a distraction and a true calling.",
                steps: "<b>Step X:</b> Choose one vision and strip away the noise. <b>Step Y:</b> Map out the pattern of your success before creating more.",
                isSeer: false
            },
            Caregiver: {
                sub: "The Heart of the Collective",
                desc: "You are the nurturer. You often fall into the 'Validation Trap,' thinking your worth is tied to how much you do for others.",
                insight: "You cannot pour from a cup that is being drained by others' projections. Your care must begin with your own Sovereignty.",
                steps: "<b>Step X:</b> Say 'No' without an explanation. <b>Step Y:</b> Practice 'Observation as Sovereignty' during family conflict.",
                isSeer: false
            },
            Explorer: {
                sub: "The Seeker of Freedom",
                desc: "You crave liberty. Yet, you may be running away from 'Inner Accuracy' because you fear that the truth will trap you.",
                insight: "Real freedom isn't the ability to leave; it's the ability to see clearly wherever you are.",
                steps: "<b>Step X:</b> Stay in one place (mentally) and observe the pattern you're trying to outrun. <b>Step Y:</b> Find the Sovereign truth in your current situation.",
                isSeer: false
            },
            Hero: {
                sub: "The Warrior of Progress",
                desc: "You are driven to win. But your 'Worth as a Transaction' means you only feel good when you've conquered something.",
                insight: "The greatest battle is dismantling the distortions in your own sight, not fighting external enemies.",
                steps: "<b>Step X:</b> Stop 'fighting' and start 'seeing.' <b>Step Y:</b> Practice 'Vulnerable Sovereignty' in your next challenge.",
                isSeer: false
            },
            Outlaw: {
                sub: "The Disruptor of Systems",
                desc: "You break the rules. This is powerful, but if you're reacting to others, you aren't actually Sovereign—you're just a rebel.",
                insight: "Disruption without Sight is just chaos. Sovereign disruption is surgical and precise.",
                steps: "<b>Step X:</b> Identify if you are rebelling or truly Seeing. <b>Step Y:</b> Use your pattern recognition to build, not just break.",
                isSeer: false
            },
            Lover: {
                sub: "The Architect of Connection",
                desc: "You value intimacy. You often lose your 'Inner Authority' in relationships, merging with others until you no longer know your own frequency.",
                insight: "The most profound connection is with your own Sovereign Sight. Only then can you truly see another.",
                steps: "<b>Step X:</b> Spend 24 hours in your own energy only. <b>Step Y:</b> Notice when you trade your sight for a sense of belonging.",
                isSeer: false
            },
            Jester: {
                sub: "The Spirit of Play",
                desc: "You bring the joy. But you might use humor as a 'Harmony Lie' to avoid the uncomfortable truths that your Seer side actually notices.",
                insight: "Play is the highest frequency of Sovereignty, but only when it's grounded in truth, not used as a mask.",
                steps: "<b>Step X:</b> Speak a difficult truth without a joke. <b>Step Y:</b> Observe the pattern of why you feel the need to lighten the mood.",
                isSeer: false
            },
            Everyman: {
                sub: "The Foundation of Community",
                desc: "You value belonging. However, you often hide your unique 'Sight' to fit in, which leads to a deep sense of being unheard.",
                insight: "Fitting in is the opposite of belonging. Belonging requires you to be your Sovereign self.",
                steps: "<b>Step X:</b> Share one 'Seer' observation with someone you trust. <b>Step Y:</b> Notice the fear of being 'different' and dismantle it.",
                isSeer: false
            },
            Innocent: {
                sub: "The Visionary of Peace",
                desc: "You want things to be right. You struggle with the 'Harmony Lie,' ignoring the distortions in others to keep your internal world peaceful.",
                insight: "True peace comes from Courageous Sight, not from closing your eyes to the darkness.",
                steps: "<b>Step X:</b> Look at one thing you've been avoiding. <b>Step Y:</b> Ask yourself what the 'Sovereign Seer' would do in this situation.",
                isSeer: false
            }
        };

        const result = data[topArchetype];
        let html = `
            <div class="archetype-name">${topArchetype}</div>
            <div class="archetype-subtitle">${result.sub}</div>
            <p>${result.desc}</p>
            <div class="insight-section">
                <h3 style="color:var(--gold); margin-bottom:10px;">The Sovereign Insight</h3>
                <p>${result.insight}</p>
            </div>
            <div style="text-align:left; margin-bottom:30px;">
                <h3 style="color:var(--gold); margin-bottom:10px;">Your Next Steps</h3>
                <p>${result.steps}</p>
            </div>
        `;

        if(result.isSeer) {
            html += `
                <div class="discount-container">
                    <p>Sovereign Recognition Activated.</p>
                    <p>Because you are a Seer, you are ready for the full framework. Use code <b>THELENS</b> to join for $88.</p>
                    <div style="font-size:2rem; margin:10px 0;">THELENS</div>
                </div>
                <button class="action-btn" onclick="location.href='#'">Enter the Masterclass</button>
            `;
        } else {
            html += `
                <p style="font-style:italic; opacity:0.8;">The Sovereign Seer course is currently accepting those who have completed their foundational steps. Complete your 'Step X' above to prepare your lens for the deep dive.</p>
            `;
        }

        html += `<div style="margin-top:40px; font-family:'Pinyon Script'; font-size:1.5rem; color:var(--gold);">Stay Clear. Stay Sovereign.</div>`;
        document.getElementById('resultsContent').innerHTML = html;
    }
</script>

</body>
</html>
